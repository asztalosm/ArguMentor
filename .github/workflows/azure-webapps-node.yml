on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: ArguMentor    # Set this to your web app name
  AZURE_WEBAPP_PACKAGE_PATH: 'frontend'      # Correct path to the frontend project folder
  NODE_VERSION: '20.x'             # Node version

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install dependencies, build, and test frontend
      run: |
        cd frontend  # Ensure you are in the frontend directory
        npm install  # Install dependencies
        npm run build --if-present  # Builds the frontend, if there is a build script
        npm run test --if-present   # Runs tests, if tests are defined

    - name: Upload artifact for deployment job
      uses: actions/upload-artifact@v4
      with:
        name: frontend-artifact
        path: frontend  # Ensure the frontend is correctly packaged

  deploy:
    permissions:
      contents: none
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Development'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
    - name: Download artifact from build job
      uses: actions/download-artifact@v4
      with:
        name: frontend-artifact

    - name: 'Deploy to Azure WebApp'
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: 'frontend'  # Point to the correct frontend folder
