name: Build and deploy Node.js app to Azure Web App - ArguMentorSite

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read # This is required for actions/checkout

    steps:
      # Checkout the repository
      - uses: actions/checkout@v4

      # Set up Node.js
      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      # Install dependencies, build the project, and run tests
      - name: npm install, build, and test
        run: |
          cd frontend
          chmod +x node_modules/.bin/vite  # Ensure vite is executable
          npm install
          npm run build --if-present  # This generates the 'dist/' folder
          
      # Verify that the build output exists
      - name: Verify build output
        run: |
          cd frontend
          ls -la dist/  # Ensure 'dist/' exists and contains the build files

      # Upload the build artifacts for deployment
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: frontend-artifact
          path: frontend/dist  # Upload only the 'dist/' folder

      # Download the artifact in the deploy job and deploy to Azure Web App
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: frontend-artifact

      # Verify artifact content after download
      - name: Verify artifact contents
        run: |
          ls -la  # Check the 'dist/' folder after download

      # Deploy the application to Azure Web App
      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'ArguMentorSite'
          slot-name: 'Production'
          package: ./frontend/dist  # Deploy the 'dist/' folder

          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_A7931984D6FA4CBCAF03321171CD168E }}
